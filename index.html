<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureTidings Web</title>
    <link rel="stylesheet" href="feedpage.css">
    <link rel="stylesheet" href="dark-theme.css">
    <link rel="stylesheet" href="options.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Readability.js"></script>
    
    <!-- NUCLEAR CACHE RESET SCRIPT -->
    <script>
        (async function() {
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (let r of regs) await r.unregister();
            }
            if ('caches' in window) {
                const keys = await caches.keys();
                for (let k of keys) await caches.delete(k);
            }
            console.log("Nuclear Cache Reset complete.");
        })();
    </script>

    <style>
        :root { --primary-orange: #ff9800; --dark-bg: #121212; }
        body { margin: 0; font-family: sans-serif; background: var(--dark-bg); color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #login-card { background: #1e1e1e; padding: 40px; border-radius: 12px; text-align: center; width: 90%; max-width: 400px; border: 1px solid #333; }
        #login-card input { width: 100%; padding: 12px; margin: 10px 0; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        #login-card button { width: 100%; padding: 12px; margin-top: 10px; background: var(--primary-orange); border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; }
        #app-container { display: none; height: 100vh; flex-direction: column; flex: 1; }
        #web-header { background: #1e1e1e; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .hidden { display: none !important; }
        #reader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; overflow-y: auto; padding: 40px 20px; box-sizing: border-box; }
        #reader-wrapper { position: relative; max-width: 850px; margin: 0 auto; width: 100%; }
        #reader-content { background: #1e1e1e; padding: 40px; border-radius: 12px; line-height: 1.7; color: #eee; border: 1px solid #333; }
        #reader-close { position: absolute; top: 0; right: -60px; background: #333; color: white; border: 1px solid #444; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 28px; display: flex; align-items: center; justify-content: center; }
        @media (max-width: 1000px) { #reader-close { right: 10px; top: 10px; background: rgba(0,0,0,0.6); } }
        .spinner { border: 3px solid rgba(255,255,255,0.1); width: 30px; height: 30px; border-radius: 50%; border-left-color: var(--primary-orange); animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .post-row { display: flex; padding: 12px 15px; border-bottom: 1px solid #222; gap: 15px; align-items: center; transition: background 0.1s; cursor: pointer; }
        .post-row:hover { background: #1f1f1f; }
        .post-thumbnail { width: 90px; height: 60px; object-fit: cover; border-radius: 4px; background: #111; flex-shrink: 0; border: 1px solid #333; background-size: cover; background-position: center; }
        .post-info { flex: 1; min-width: 0; }
        .post-title { font-size: 14px; font-weight: 600; color: #eee; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .post-meta { font-size: 11px; color: #666; display: flex; align-items: center; justify-content: space-between; }
        .action-btn { background: #2a2a2a; border: 1px solid #3d3d3d; color: #fff !important; width: 34px; height: 34px; border-radius: 4px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .action-btn:hover { background: #444; border-color: var(--primary-orange); }
        .feed-header { background: #222; padding: 10px 15px; font-size: 12px; font-weight: 700; color: #888; border-bottom: 1px solid #333; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <div id="login-card">
            <img src="128.png" style="width: 64px; margin-bottom: 20px;">
            <h1>PureTidings</h1>
            <input type="email" id="email-input" placeholder="Deine E-Mail">
            <input type="password" id="password-input" placeholder="Passwort (optional)">
            <button id="login-btn">Login / Magic Link</button>
            <div id="auth-status" style="margin-top:15px; font-size:13px; color:#888;"></div>
        </div>
    </div>

    <div id="reader-overlay">
        <div id="reader-wrapper">
            <button id="reader-close" onclick="closeReader()">&times;</button>
            <div id="reader-content">
                <div id="reader-loading"></div>
                <div id="reader-body"></div>
            </div>
        </div>
    </div>

    <div id="app-container">
        <header id="web-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <strong>PureTidings</strong>
                <span id="user-badge" style="font-size:12px; color:#666;"></span>
            </div>
            <div style="display:flex; gap:10px;">
                <a id="upgrade-btn" class="hidden" style="color:gold; font-size:11px; border:1px solid gold; padding:4px 10px; border-radius:4px; text-decoration:none; font-weight:bold;">UPGRADE PRO</a>
                <button id="logout-btn" style="background:transparent; border:1px solid #444; color:#aaa; padding:4px 10px; border-radius:4px; cursor:pointer; font-size:11px;">LOGOUT</button>
            </div>
        </header>
        <div style="display:flex; flex:1; overflow:hidden;">
            <div id="feed-tree-container" style="width:260px; border-right:1px solid #333; overflow-y:auto; background:#181818;"></div>
            <div id="posts-container" style="flex:1; overflow-y:auto; background:#121212;"></div>
        </div>
    </div>
    <script src="app.js?v=1.4"></script>
</body>
</html>
